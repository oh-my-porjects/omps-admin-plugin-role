module: role
module_title: 角色管理
menus:
  - key: roles
    title: 角色列表
    icon: team
    roles: [admin, developer]
    views: [role_list]
  - key: permissions
    title: 权限点
    icon: lock
    roles: [admin, developer]
    views: [permission_list]
views:
  - key: role_list
    type: table
    title: 角色
    api: GET /api/role/list
    columns:
      - field: role_id
        title: ID
        render: short_id
      - field: name
        title: 角色名
      - field: parent_name
        title: 父角色
      - field: system
        title: 来源
        render: enum
        enum:
          "true": 系统预设
          "false": 用户创建
      - field: description
        title: 说明
      - field: status
        title: 状态
        render: enum
        enum:
          enabled: 启用
          disabled: 禁用
      - field: created_at
        title: 创建时间
        render: datetime
    actions:
      - key: create
        type: page
        title: 新建角色
        api: POST /api/role/create
      - key: edit
        type: row
        title: 编辑
        api: PUT /api/role/update
      - key: assign_permissions
        type: row
        title: 分配权限
        api: PUT /api/role/assign-permissions
  - key: permission_list
    type: table
    title: 权限点
    api: GET /api/role/permission-list
    columns:
      - field: permission_id
        title: ID
        render: short_id
      - field: code
        title: 权限码
      - field: name
        title: 名称
      - field: description
        title: 说明
      - field: created_at
        title: 创建时间
        render: datetime
    actions:
      - key: create
        type: page
        title: 新建权限点
        api: POST /api/role/permission-create
roles:
  - code: admin
    title: 超级管理员
  - code: developer
    title: 开发者
