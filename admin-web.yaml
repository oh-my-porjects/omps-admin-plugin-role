module: role
module_title: 角色管理
menus:
  - key: roles
    title: 角色列表
    icon: team
    roles: [admin, developer]
    views: [role_list]
  - key: permissions
    title: 权限点
    icon: lock
    roles: [admin, developer]
    views: [permission_list]
views:
  - key: role_list
    type: table
    title: 角色
    api: GET /api/role/list
    columns:
      - field: role_id
        title: ID
        render: short_id
      - field: name
        title: 角色名
      - field: parent_name
        title: 父角色
      - field: system
        title: 来源
        render: enum
        enum:
          "true": 系统预设
          "false": 用户创建
      - field: description
        title: 说明
      - field: status
        title: 状态
        render: enum
        enum:
          enabled: 启用
          disabled: 禁用
      - field: created_at
        title: 创建时间
        render: datetime
    actions:
      - key: create
        type: page
        title: 新建角色
        api: POST /api/role/create
        fields:
          - field: name
            title: 角色名
            type: string
            required: true
            placeholder: 例如 业务管理员
          - field: parent_id
            title: 父角色 ID
            type: string
            placeholder: 留空则为顶级角色
          - field: description
            title: 说明
            type: text
          - field: status
            title: 状态
            type: enum
            enum:
              enabled: 启用
              disabled: 禁用
            default: enabled
      - key: edit
        type: row
        title: 编辑
        api: PUT /api/role/update
        fields:
          - field: role_id
            title: 角色 ID
            type: string
            hidden: true
          - field: name
            title: 角色名
            type: string
            required: true
          - field: parent_id
            title: 父角色 ID
            type: string
          - field: description
            title: 说明
            type: text
          - field: status
            title: 状态
            type: enum
            enum:
              enabled: 启用
              disabled: 禁用
      - key: assign_permissions
        type: row
        title: 分配权限
        api: PUT /api/role/assign-permissions
        fields:
          - field: role_id
            title: 角色 ID
            type: string
            hidden: true
          - field: permission_ids
            title: 权限点 ID 列表
            type: json
            required: true
            placeholder: '["perm_id1", "perm_id2"]'
  - key: permission_list
    type: table
    title: 权限点
    api: GET /api/role/permission-list
    columns:
      - field: permission_id
        title: ID
        render: short_id
      - field: code
        title: 权限码
      - field: name
        title: 名称
      - field: description
        title: 说明
      - field: created_at
        title: 创建时间
        render: datetime
    actions:
      - key: create
        type: page
        title: 新建权限点
        api: POST /api/role/permission-create
        fields:
          - field: code
            title: 权限码
            type: string
            required: true
            placeholder: 例如 admin.account.manage
          - field: name
            title: 名称
            type: string
            required: true
          - field: description
            title: 说明
            type: text
roles:
  - code: admin
    title: 超级管理员
  - code: developer
    title: 开发者
