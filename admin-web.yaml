module: role
module_title: 角色管理
menus:
  - key: roles
    title: 角色列表
    icon: team
    roles: [admin, developer]
    views: [role_list]
  - key: permissions
    title: 权限点
    icon: lock
    roles: [admin, developer]
    views: [permission_list]
views:
  - key: role_list
    type: table
    title: 角色
    api: GET /api/role/list
    columns:
      - field: id
        title: ID
      - field: name
        title: 角色名
      - field: parent_id
        title: 父角色
      - field: description
        title: 说明
      - field: status
        title: 状态
        render: enum
        enum:
          enabled: 启用
          disabled: 禁用
      - field: created_at
        title: 创建时间
        render: datetime
    actions:
      - key: create
        type: page
        title: 新建角色
        api: POST /api/role/create
      - key: edit
        type: row
        title: 编辑
        api: PUT /api/role/{id}
      - key: delete
        type: row
        title: 删除
        api: DELETE /api/role/{id}
        danger: true
  - key: permission_list
    type: table
    title: 权限点
    api: GET /api/role/permissions
    columns:
      - field: id
        title: ID
      - field: code
        title: 权限码
      - field: name
        title: 名称
      - field: description
        title: 说明
roles:
  - code: admin
    title: 超级管理员
  - code: developer
    title: 开发者
